---
layout: compress
---
{% include base_path %}
<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    
    <style>
      /* 全屏首图样式 */
      #fullscreen-intro {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        background-image: url('{{ site.baseurl }}/images/Nittany2.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-color: #1a1a1a;
        z-index: 10000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.6s ease;
      }
      
      #fullscreen-intro.hidden {
        opacity: 0;
        visibility: hidden;
        transform: translateY(-100%);
      }
      
      .welcome-text {
        color: white;
        font-size: 3rem;
        font-weight: 300;
        text-align: center;
        margin-bottom: 2rem;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
      }
      
      .scroll-hint {
        position: absolute;
        bottom: 40px;
        color: white;
        text-align: center;
        font-size: 16px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        animation: pulse 2s infinite;
      }
      
      .scroll-hint:hover {
        transform: scale(1.1);
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
      
      /* 隐藏body滚动条 */
      body.intro-active {
        overflow: hidden;
      }
      
      /* 移动端优化 */
      @media (max-width: 768px) {
        .welcome-text {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  
  <body class="intro-active">
    <!-- 全屏首图 -->
    <div id="fullscreen-intro">
      <h1 class="welcome-text">Welcome</h1>
      <div class="scroll-hint" onclick="hideIntro()">
        <span>Scroll Up</span>
        <div class="arrow">↑</div>
      </div>
    </div>
    
    <!-- 主内容 -->
    <div id="main-content">
      {% include browser-upgrade.html %}
      {% include masthead.html %}
      {{ content }}
      <div class="page__footer">
        <footer>
          {% include footer/custom.html %}
          {% include footer.html %}
        </footer>
      </div>
    </div>
    
    {% include scripts.html %}
    
    <script>
      // 确保DOM加载完成
      document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, initializing intro...');
        
        var intro = document.getElementById('fullscreen-intro');
        var body = document.body;
        var isHidden = false;
        
        // 全局函数，供onclick使用
        window.hideIntro = function() {
          if (isHidden) return;
          isHidden = true;
          console.log('Hiding intro...');
          
          intro.classList.add('hidden');
          body.classList.remove('intro-active');
          
          setTimeout(function() {
            intro.style.display = 'none';
          }, 600);
        }
        
        // 监听各种事件
        
        // 1. 鼠标滚轮
        document.addEventListener('wheel', function(e) {
          console.log('Wheel event detected');
          if (e.deltaY > 0) {
            hideIntro();
          }
        });
        
        // 2. 键盘
        document.addEventListener('keydown', function(e) {
          console.log('Key pressed:', e.key);
          // 空格、Enter、向下箭头、Page Down
          if (e.key === ' ' || e.key === 'Enter' || e.key === 'ArrowDown' || e.key === 'PageDown') {
            e.preventDefault();
            hideIntro();
          }
        });
        
        // 3. 触摸（移动端）
        var touchStartY = 0;
        document.addEventListener('touchstart', function(e) {
          touchStartY = e.touches[0].clientY;
          console.log('Touch start at:', touchStartY);
        });
        
        document.addEventListener('touchend', function(e) {
          var touchEndY = e.changedTouches[0].clientY;
          console.log('Touch end at:', touchEndY);
          if (touchStartY - touchEndY > 50) { // 向上滑动超过50px
            hideIntro();
          }
        });
        
        // 4. 点击整个屏幕
        intro.addEventListener('click', function(e) {
          console.log('Intro clicked');
          hideIntro();
        });
        
        // 5. 自动隐藏（10秒后）
        setTimeout(function() {
          if (!isHidden) {
            console.log('Auto-hiding after 10 seconds');
            hideIntro();
          }
        }, 10000);
        
        console.log('All event listeners attached');
      });
    </script>
  </body>
</html>
