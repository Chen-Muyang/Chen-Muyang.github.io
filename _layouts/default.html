---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    
    <!-- 添加全屏首图样式 -->
    <style>
      /* 全屏首图样式 */
      #fullscreen-intro {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 9999;
        background: #000;
      }

      .intro-image {
        width: 100%;
        height: 100%;
        background-image: url('{{ site.baseurl }}/files/你的图片文件名.jpg'); /* 替换为你的图片路径 */
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }

      /* 滚动指示器 */
      .scroll-indicator {
        position: absolute;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%);
        color: white;
        text-align: center;
        opacity: 0.8;
        animation: bounce 2s infinite;
        font-family: Arial, sans-serif;
        font-size: 16px;
      }

      .scroll-indicator .arrow {
        width: 20px;
        height: 20px;
        margin: 10px auto 0;
        border-right: 2px solid white;
        border-bottom: 2px solid white;
        transform: rotate(45deg);
      }

      @keyframes bounce {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50% { transform: translateX(-50%) translateY(-10px); }
      }

      /* 主内容区域初始状态 */
      .content-hidden {
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }

      /* 主内容区域显示状态 */
      .content-visible {
        opacity: 1;
        visibility: visible;
      }
      
      /* 确保body不滚动直到首图消失 */
      body.no-scroll {
        overflow: hidden;
        height: 100vh;
      }
    </style>
  </head>

  <body class="no-scroll">

    <!-- 全屏首图部分 -->
    <div id="fullscreen-intro">
      <div class="intro-image"></div>
      <div class="scroll-indicator">
        <span>Scroll Up</span>
        <div class="arrow"></div>
      </div>
    </div>

    <!-- 现有网站内容包装 -->
    <div id="main-content" class="content-hidden">
      {% include browser-upgrade.html %}
      {% include masthead.html %}

      {{ content }}

      <div class="page__footer">
        <footer>
          {% include footer/custom.html %}
          {% include footer.html %}
        </footer>
      </div>
    </div>

    {% include scripts.html %}
    
    <!-- 全屏首图交互脚本 -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const fullscreenIntro = document.getElementById('fullscreen-intro');
        const mainContent = document.getElementById('main-content');
        const body = document.body;
        let introDismissed = false;
        let scrollTimeout;
        
        // 检测滚动事件
        function handleScroll(event) {
          if (introDismissed) return;
          
          // 清除之前的超时
          clearTimeout(scrollTimeout);
          
          // 设置新的超时来触发隐藏
          scrollTimeout = setTimeout(function() {
            // 检查滚动方向 - 向上滚动
            if (event.deltaY > 0 || window.pageYOffset > 0) {
              dismissIntro();
            }
          }, 50);
        }
        
        // 检测触摸事件
        function handleTouchMove(event) {
          if (introDismissed) return;
          
          // 如果有向上滚动的趋势，就隐藏首图
          if (window.pageYOffset > 5) {
            dismissIntro();
          }
        }
        
        // 检测键盘事件（空格、方向键等）
        function handleKeyDown(event) {
          if (introDismissed) return;
          
          // 空格、PageDown、向下箭头等都会触发
          if ([32, 33, 34, 40].includes(event.keyCode)) {
            dismissIntro();
          }
        }
        
        // 隐藏首图并显示主内容
        function dismissIntro() {
          if (introDismissed) return;
          introDismissed = true;
          
          console.log('Dismissing intro'); // 调试用
          
          // 淡出首图
          fullscreenIntro.style.transition = 'opacity 0.5s ease';
          fullscreenIntro.style.opacity = '0';
          
          // 显示主内容
          mainContent.classList.remove('content-hidden');
          mainContent.classList.add('content-visible');
          
          // 恢复body滚动
          body.classList.remove('no-scroll');
          
          // 移除首图元素
          setTimeout(() => {
            fullscreenIntro.style.display = 'none';
            // 移除所有事件监听
            window.removeEventListener('wheel', handleScroll);
            window.removeEventListener('scroll', handleTouchMove);
            window.removeEventListener('keydown', handleKeyDown);
            window.removeEventListener('touchmove', handleTouchMove);
          }, 500);
        }
        
        // 添加各种事件监听
        window.addEventListener('wheel', handleScroll, { passive: true });
        window.addEventListener('scroll', handleTouchMove, { passive: true });
        window.addEventListener('keydown', handleKeyDown);
        window.addEventListener('touchmove', handleTouchMove, { passive: true });
        
        // 点击跳过功能
        fullscreenIntro.addEventListener('click', dismissIntro);
        
        // 可选：设置超时自动隐藏（例如8秒后）
        // setTimeout(dismissIntro, 8000);
        
        // 调试：确保脚本加载
        console.log('Fullscreen intro script loaded');
      });
    </script>

  </body>
</html>
