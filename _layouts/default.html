---
layout: compress
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}" class="no-js"{% if site.site_theme == "dark" %} data-theme="dark"{% endif %}>
  <head>
    {% include head.html %}
    {% include head/custom.html %}
    
    <style>
      /* 全屏首图样式 */
      #fullscreen-intro {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url('{{ site.baseurl }}/files/你的图片文件名.jpg');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        z-index: 10000;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding-bottom: 50px;
        transition: opacity 0.8s ease, visibility 0.8s ease;
      }

      .scroll-hint {
        color: white;
        text-align: center;
        font-size: 18px;
        margin-bottom: 20px;
        animation: fadeInOut 2s infinite;
      }

      .scroll-hint .arrow {
        font-size: 24px;
        margin-top: 10px;
        display: block;
      }

      @keyframes fadeInOut {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }

      /* 隐藏body滚动条 */
      body.intro-active {
        overflow: hidden;
        height: 100vh;
      }

      /* 主内容 - 初始在屏幕外 */
      #main-content {
        position: relative;
        z-index: 1;
      }
    </style>
  </head>

  <body class="intro-active">

    <!-- 全屏首图 -->
    <div id="fullscreen-intro">
      <div class="scroll-hint">
        Scroll Up
        <div class="arrow">↑</div>
      </div>
    </div>

    <!-- 主内容 -->
    <div id="main-content">
      {% include browser-upgrade.html %}
      {% include masthead.html %}

      {{ content }}

      <div class="page__footer">
        <footer>
          {% include footer/custom.html %}
          {% include footer.html %}
        </footer>
      </div>
    </div>

    {% include scripts.html %}
    
    <script>
      // 简单直接的解决方案
      let intro = document.getElementById('fullscreen-intro');
      let body = document.body;
      let scrolled = false;

      // 方法1: 直接监听整个文档的滚动事件
      window.addEventListener('scroll', function() {
        if (!scrolled && (window.pageYOffset > 10 || document.documentElement.scrollTop > 10)) {
          hideIntro();
        }
      });

      // 方法2: 监听鼠标滚轮事件
      window.addEventListener('wheel', function(e) {
        if (!scrolled && e.deltaY > 0) {
          hideIntro();
        }
      });

      // 方法3: 监听触摸滑动事件
      window.addEventListener('touchmove', function(e) {
        if (!scrolled) {
          hideIntro();
        }
      });

      // 方法4: 监听键盘事件
      window.addEventListener('keydown', function(e) {
        if (!scrolled && [32, 34, 40].includes(e.keyCode)) { // 空格, PageDown, 向下箭头
          hideIntro();
        }
      });

      // 方法5: 点击任意位置跳过
      intro.addEventListener('click', function() {
        if (!scrolled) {
          hideIntro();
        }
      });

      function hideIntro() {
        if (scrolled) return;
        scrolled = true;
        
        // 淡出首图
        intro.style.opacity = '0';
        intro.style.visibility = 'hidden';
        
        // 允许页面滚动
        body.classList.remove('intro-active');
        
        // 3秒后完全移除元素
        setTimeout(function() {
          intro.style.display = 'none';
        }, 800);
      }

      // 备用方案: 8秒后自动隐藏
      setTimeout(function() {
        if (!scrolled) {
          hideIntro();
        }
      }, 8000);

      console.log('Intro script loaded successfully');
    </script>

  </body>
</html>
